# ── API Proxy ─────────────────────────────────
[[redirects]]
  from = "/api/*"
  to = "https://healthyday-backend-773381060399.asia-south1.run.app/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
