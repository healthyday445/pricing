[build]
  command = "npm run build"
  publish = "dist"

# ── QR Code Redirect Routes ──────────────────
# Netlify native 302 redirects. Query params are forwarded automatically.
# To change a destination, just edit the "to" URL and redeploy.
# Later, you can switch these to proxy to the FastAPI service on Cloud Run.

[[redirects]]
  from = "/ofl"
  to = "https://register.dailyyogawithjagan.com"
  status = 302
  force = true

